<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Persian RTL Fixer</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <h1>Persian RTL Fixer</h1>
    <p class="subtitle">AI chat RTL support</p>
  </header>

  <label class="toggle-row">
    <span>Enabled</span>
    <input type="checkbox" id="enabled" checked />
    <span class="switch"></span>
  </label>

  <section class="info">
    <p>Fixes Persian and mixed Persian/English text direction on AI chat websites.</p>
    <p class="sites-label">Supported platforms:</p>
    <ul>
      <li>ChatGPT</li>
      <li>Claude</li>
      <li>Gemini</li>
      <li>Copilot</li>
      <li>Perplexity</li>
      <li>DeepSeek</li>
      <li>and more</li>
    </ul>
  </section>

  <footer>
    <p>Chrome · Firefox · Edge</p>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
